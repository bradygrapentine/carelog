# Mergify config — merge queue replacement for GitHub native auto-merge.
#
# Why: GitHub's merge queue isn't available on personal-account public repos
# despite the docs. We hit a 3-PR rebase storm on 2026-04-25 because every
# armed auto-merge re-rebased its siblings. Mergify queues PRs, runs CI once
# per batch on a synthetic merge SHA, and lands them in order — replacing the
# O(N²) rebase tax with O(N).
#
# UX: instead of `gh pr merge --auto --squash <num>`, the new flow is:
#   gh pr edit <num> --add-label queue
# Mergify watches for the `queue` label and routes the PR into the queue.
# (Mergify does not have a first-class condition for GitHub native
# auto-merge; label-based triggers are the canonical pattern.)
#
# Operator step (one-time): install the Mergify GitHub App on this repo
# at https://github.com/apps/mergify (free for public repos), and create
# a `queue` label on the repo (`gh label create queue --color "0e8a16"`).

queue_rules:
  - name: default
    # Path-filtered jobs (Web/Mobile/RLS pgTAP/E2E per TD-30) report SKIPPED
    # on PRs that don't touch their files. `check-success=` won't match SKIPPED,
    # so we use the CI Summary aggregate check that's green when every relevant
    # downstream job either passed or was correctly skipped.
    queue_conditions:
      - "check-success=CI Summary"
      - "check-success=Lint"
      - "check-success=Typecheck"
      - "check-success=Dependency audit"
      - "check-success=OSV Scanner"
      - "check-success=Secret scan (Gitleaks)"
      - "check-success=Vuln scan (Trivy)"
    # Same checks must stay green on the synthetic merge SHA before the
    # batch lands. Mergify reruns CI on a temporary branch per batch.
    merge_conditions:
      - "check-success=CI Summary"
      - "check-success=Lint"
      - "check-success=Typecheck"
      - "check-success=Dependency audit"
      - "check-success=OSV Scanner"
      - "check-success=Secret scan (Gitleaks)"
      - "check-success=Vuln scan (Trivy)"
    merge_method: squash
    # Batch up to 5 queued PRs into one CI run. With one-person workflow
    # and the existing parallel-dispatch pattern, batching saves a lot
    # of CI minutes on multi-PR sessions.
    batch_size: 5
    batch_max_wait_time: "5 min"
    # If a batch fails, Mergify bisects to find the bad PR and ejects it.
    queue_branch_prefix: mq/

pull_request_rules:
  - name: queue PRs labeled "queue"
    # Trigger: add the `queue` label on a PR (e.g. `gh pr edit <num>
    # --add-label queue`). Mergify routes it into the default queue.
    # Replaces the prior `gh pr merge --auto --squash` workflow because
    # GitHub's native auto-merge races Mergify (auto-merge rebases the
    # PR head; Mergify queues a synthetic merge SHA).
    conditions:
      - "label=queue"
      - "-draft"
      - "-conflict"
    actions:
      queue:
        name: default
