<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CareSync — Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" />
<style>
  :root {
    /* === CareSync Burnt-Orange Palette (kept verbatim from globals.css) === */
    --color-primary:         #D2691E;
    --color-primary-light:   #E48A4A;
    --color-primary-subtle:  #FAEFE0;
    --color-primary-hover:   #B8581A;
    --color-primary-pressed: #9C4A14;
    --color-primary-deep:    #6B3210;
    --color-secondary:       #A0480B;
    --color-secondary-light: #C26020;
    --color-secondary-subtle:#FCE9D6;
    --color-ink:             #2A1810;
    --color-surface:         #FBF7F2;
    --color-surface-muted:   #F0E8DD;
    --color-app-shell:       #2A1810;
    --color-app-shell-text:  #FAEFE0;
    --color-app-shell-muted: #B89880;
    --color-text-primary:    #2A1810;
    --color-text-secondary:  #5A453A;
    --color-muted:           #7A6558;
    --color-border:          #E8DFD4;
    --color-warning:         #f59e0b;
    --color-success:         #10b981;
    --color-danger:          #c41a1a;
    --color-success-subtle:  #f0fdf4;
    --color-warning-subtle:  #fffbeb;
    --color-danger-subtle:   #fef2f2;
    --color-mood-good:       #22c55e;
    --color-mood-okay:       #f59e0b;
    --color-mood-difficult:  #f97316;
    --color-mood-crisis:     #ef4444;

    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --radius-card: 14px;

    --font-sans: 'Geist', system-ui, -apple-system, sans-serif;
    --font-display: 'Fraunces', Georgia, serif;
    --font-mono: 'Geist Mono', ui-monospace, monospace;

    /* tweak-driven */
    --card-radius: 14px;
    --row-gap: 16px;
    --card-pad: 20px;
    --header-pad-y: 12px;
    --hero-pad: 32px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--color-surface);
    color: var(--color-text-primary);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
    min-height: 100vh;
  }

  /* Editorial type ----------------------------------------------------- */
  .headline-display {
    font-family: var(--font-display);
    font-weight: 400;
    letter-spacing: -0.025em;
    line-height: 1.05;
    color: var(--color-ink);
  }
  .headline-display em {
    font-style: italic;
    font-weight: 300;
    color: var(--color-primary-deep);
  }
  .headline-display.bold em {
    font-style: normal;
    font-weight: 600;
    color: inherit;
  }
  .headline-display.sansy {
    font-family: var(--font-sans);
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .headline-display.sansy em {
    font-style: normal;
    font-weight: 700;
    color: var(--color-primary-deep);
  }
  .eyebrow-mono {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--color-muted);
    font-weight: 500;
  }

  /* App shell ---------------------------------------------------------- */
  .app {
    display: grid;
    grid-template-columns: var(--shell-w, 240px) 1fr;
    min-height: 100vh;
    transition: grid-template-columns 200ms ease;
  }
  .app.shell-hidden { grid-template-columns: 0 1fr; }
  .app.shell-rail { --shell-w: 64px; }

  .shell {
    background: var(--color-app-shell);
    color: var(--color-app-shell-text);
    padding: 20px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .shell-hidden .shell { display: none; }

  .shell-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px 22px;
  }
  .shell-mark {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--color-primary);
    display: grid; place-items: center;
    font-family: var(--font-display);
    color: var(--color-surface);
    font-weight: 600;
    font-size: 17px;
    flex-shrink: 0;
  }
  .shell-mark::after { content: "c"; transform: translateY(-1px); }
  .shell-name {
    font-family: var(--font-display);
    font-size: 19px;
    letter-spacing: -0.01em;
    color: var(--color-app-shell-text);
    white-space: nowrap;
  }
  .shell.rail .shell-name,
  .shell.rail .shell-section-label,
  .shell.rail .nav-label,
  .shell.rail .nav-meta,
  .shell.rail .recipient-card,
  .shell.rail .shell-footer { display: none; }
  .shell.rail .nav-item { justify-content: center; padding: 10px 0; }
  .shell.rail .shell-logo { justify-content: center; padding: 6px 0 22px; }

  .shell-section-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--color-app-shell-muted);
    padding: 16px 10px 8px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 10px;
    border-radius: 10px;
    color: var(--color-app-shell-muted);
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    user-select: none;
    transition: background 120ms ease, color 120ms ease;
    text-decoration: none;
  }
  .nav-item:hover { background: rgba(250, 239, 224, 0.06); color: var(--color-app-shell-text); }
  .nav-item.active { background: var(--color-primary); color: white; }
  .nav-item.active .nav-meta { color: rgba(255,255,255,0.75); }
  .nav-item svg { flex-shrink: 0; opacity: 0.9; }
  .nav-label { flex: 1; white-space: nowrap; }
  .nav-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--color-app-shell-muted);
  }
  .recipient-card {
    margin-top: 8px;
    padding: 12px;
    border-radius: 12px;
    background: rgba(250, 239, 224, 0.06);
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .recipient-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--color-secondary-subtle);
    color: var(--color-secondary);
    display: grid; place-items: center;
    font-weight: 600;
    font-size: 13px;
    font-family: var(--font-sans);
    flex-shrink: 0;
  }
  .recipient-name {
    font-size: 13px;
    color: var(--color-app-shell-text);
    line-height: 1.2;
  }
  .recipient-status {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--color-app-shell-muted);
    margin-top: 2px;
  }
  .shell-footer { margin-top: auto; padding-top: 16px; }

  /* Page --------------------------------------------------------------- */
  .page {
    padding: 28px clamp(20px, 4vw, 44px) 80px;
    max-width: 1280px;
    width: 100%;
    margin: 0 auto;
  }
  .page-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .page-head > div:first-child { flex: 1 1 280px; min-width: 0; }
  .page-head .eyebrow-mono { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .page-title {
    margin: 0;
    font-size: clamp(28px, 3vw, 40px);
  }
  .page-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  /* Buttons ------------------------------------------------------------ */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 36px;
    padding: 0 14px;
    border-radius: var(--radius-lg);
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    background: transparent;
    color: var(--color-text-primary);
    transition: background 120ms ease, border-color 120ms ease, transform 100ms ease;
    white-space: nowrap;
  }
  .btn:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 2px; }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: var(--color-primary-pressed);
    color: white;
    font-weight: 600;
  }
  .btn-primary:hover { background: var(--color-primary-deep); }
  .btn-outline {
    border-color: var(--color-border);
    background: white;
  }
  .btn-outline:hover { background: var(--color-primary-subtle); }
  .btn-ghost {
    background: transparent;
    color: var(--color-text-secondary);
  }
  .btn-ghost:hover { background: var(--color-surface-muted); }
  .btn svg { width: 15px; height: 15px; }
  .btn-sm { height: 30px; font-size: 12.5px; padding: 0 10px; }

  /* Toggle group ------------------------------------------------------- */
  .toggle-group {
    display: inline-flex;
    background: white;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 3px;
  }
  .toggle-group button {
    border: none;
    background: transparent;
    padding: 6px 12px;
    font: inherit;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--color-text-secondary);
    border-radius: 10px;
    cursor: pointer;
  }
  .toggle-group button.active {
    background: var(--color-primary-subtle);
    color: var(--color-primary-deep);
  }

  /* Cards -------------------------------------------------------------- */
  .card {
    background: white;
    border: 1px solid var(--color-border);
    border-radius: var(--card-radius);
    overflow: hidden;
    transition: box-shadow 150ms ease, transform 150ms ease;
  }
  .card.lift:hover {
    box-shadow: 0 4px 12px rgba(42, 24, 16, 0.06);
  }
  .card-header {
    padding: var(--header-pad-y) 18px;
    border-bottom: 1px solid var(--color-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .card-title {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--color-text-primary);
    margin: 0;
    letter-spacing: -0.005em;
  }
  .card-body {
    padding: var(--card-pad);
  }

  /* Card header variants */
  .ch-tinted { background: var(--color-primary-subtle); }
  .ch-outline { background: transparent; }
  .ch-accent { background: transparent; border-left: 4px solid var(--color-primary); padding-left: 14px; }
  .ch-serif .card-title {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 17px;
    letter-spacing: -0.01em;
  }
  .ch-serif { background: transparent; }

  /* Hero --------------------------------------------------------------- */
  .hero {
    position: relative;
    overflow: hidden;
    background: white;
    border: 1px solid var(--color-border);
    border-radius: var(--card-radius);
    padding: var(--hero-pad);
  }
  .hero-blob {
    position: absolute;
    top: -100px; right: -80px;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: var(--color-primary-subtle);
    opacity: 0.55;
    pointer-events: none;
  }
  .hero-blob.warm {
    background: radial-gradient(circle at 30% 30%, var(--color-secondary-subtle), transparent 70%);
    opacity: 1;
  }
  .hero-content { position: relative; }
  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px;
    border: 1px solid var(--color-border);
    border-radius: 999px;
    background: var(--color-surface);
    margin-bottom: 16px;
  }
  .hero-eyebrow .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--color-primary);
  }
  .hero-headline {
    font-size: clamp(28px, 3vw + 0.5rem, 44px);
    margin: 0;
    max-width: 760px;
  }
  .hero-headline.compact { font-size: clamp(24px, 2.5vw + 0.5rem, 32px); }
  .hero-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 20px;
    list-style: none; padding: 0;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    color: var(--color-text-secondary);
  }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; }
  .pill.success { background: var(--color-success-subtle); }
  .pill.success .dot { background: var(--color-success); }
  .pill.primary { background: var(--color-primary-subtle); }
  .pill.primary .dot { background: var(--color-primary); }
  .pill.warning { background: var(--color-warning-subtle); }
  .pill.warning .dot { background: var(--color-warning); }

  /* Grid layouts ------------------------------------------------------- */
  .grid {
    display: grid;
    gap: var(--row-gap);
  }
  .grid-editorial { grid-template-columns: 1.6fr 1fr; }
  .grid-magazine { grid-template-columns: 1fr 1fr 1fr; }
  @media (max-width: 980px) {
    .grid-editorial, .grid-magazine { grid-template-columns: 1fr; }
  }
  .col { display: flex; flex-direction: column; gap: var(--row-gap); }

  /* Med card ----------------------------------------------------------- */
  .med-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--color-border);
  }
  .med-row:last-child { border-bottom: none; }
  .med-check {
    width: 22px; height: 22px;
    border: 1.5px solid var(--color-border);
    border-radius: 7px;
    display: grid; place-items: center;
    flex-shrink: 0;
    background: white;
    cursor: pointer;
  }
  .med-check.done {
    background: var(--color-primary);
    border-color: var(--color-primary);
    color: white;
  }
  .med-check.done svg { display: block; }
  .med-check svg { display: none; width: 14px; height: 14px; }
  .med-check.missed { border-color: var(--color-mood-difficult); border-style: dashed; }
  .med-info { flex: 1; min-width: 0; }
  .med-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--color-text-primary);
    display: flex; align-items: baseline; gap: 8px;
    flex-wrap: wrap;
  }
  .med-name .dosage {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--color-muted);
    font-weight: 400;
  }
  .med-meta {
    font-size: 12px;
    color: var(--color-text-secondary);
    margin-top: 2px;
  }
  .med-time {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--color-muted);
    text-align: right;
    flex-shrink: 0;
  }
  .med-time.missed { color: var(--color-mood-difficult); }

  /* Mood card ---------------------------------------------------------- */
  .mood-week {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 14px;
  }
  .mood-day {
    display: flex; flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .mood-day-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--color-muted);
    text-transform: uppercase;
  }
  .mood-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-size: 13px;
    font-weight: 600;
  }
  .mood-dot.good { background: #dcfce7; color: #15803d; }
  .mood-dot.okay { background: #fef3c7; color: #b45309; }
  .mood-dot.difficult { background: #ffedd5; color: #c2410c; }
  .mood-dot.crisis { background: #fee2e2; color: #b91c1c; }
  .mood-dot.empty { background: var(--color-surface-muted); color: transparent; border: 1px dashed var(--color-border); }
  .mood-dot.today { box-shadow: 0 0 0 2px white, 0 0 0 4px var(--color-primary); }

  .mood-bars {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 14px;
    align-items: end;
    height: 64px;
  }
  .mood-bar-wrap { display:flex; flex-direction:column; align-items:center; gap: 6px; height: 100%; }
  .mood-bar { width: 100%; border-radius: 4px 4px 0 0; }
  .mood-bar.good { background: var(--color-mood-good); }
  .mood-bar.okay { background: var(--color-mood-okay); }
  .mood-bar.difficult { background: var(--color-mood-difficult); }
  .mood-bar.crisis { background: var(--color-mood-crisis); }
  .mood-bar.empty { background: var(--color-surface-muted); }

  .mood-note {
    font-size: 13px;
    color: var(--color-text-secondary);
    line-height: 1.5;
    padding-top: 12px;
    border-top: 1px solid var(--color-border);
  }
  .mood-note q { font-family: var(--font-display); font-style: italic; color: var(--color-ink); font-weight: 400; }
  .mood-note .attr { display:block; font-family: var(--font-mono); font-size: 11px; color: var(--color-muted); margin-top: 6px; }

  /* Sleep -------------------------------------------------------------- */
  .sleep-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
  .sleep-big {
    font-family: var(--font-display);
    font-size: 36px;
    font-weight: 400;
    color: var(--color-ink);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .sleep-big em { font-style: italic; font-weight: 300; color: var(--color-primary-deep); }
  .sleep-sub {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--color-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .sleep-spark { height: 56px; width: 100%; }

  /* Coming up ---------------------------------------------------------- */
  .timeline { display: flex; flex-direction: column; }
  .tl-item {
    display: grid;
    grid-template-columns: 90px 1fr auto;
    gap: 14px;
    padding: 12px 0;
    align-items: start;
    border-bottom: 1px solid var(--color-border);
  }
  .tl-item:last-child { border-bottom: none; }
  .tl-when {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--color-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding-top: 2px;
  }
  .tl-title { font-size: 14px; color: var(--color-text-primary); font-weight: 500; line-height: 1.4; }
  .tl-sub { font-size: 12.5px; color: var(--color-text-secondary); margin-top: 2px; line-height: 1.5; }
  .tl-tag {
    font-family: var(--font-mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 3px 8px;
    border-radius: 999px;
    background: var(--color-surface-muted);
    color: var(--color-muted);
  }
  .tl-tag.appt { background: var(--color-primary-subtle); color: var(--color-primary-deep); }
  .tl-tag.meds { background: var(--color-success-subtle); color: #15803d; }
  .tl-tag.shift { background: var(--color-secondary-subtle); color: var(--color-secondary); }

  /* On shift sidebar --------------------------------------------------- */
  .shift-now {
    background: var(--color-success-subtle);
    border: 1px solid #c7f0d9;
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .shift-now-label {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #15803d;
    font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .shift-now-label .pulse {
    width: 8px; height: 8px;
    background: var(--color-success);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity: 0.4 } }
  .shift-name { font-size: 15px; font-weight: 600; color: var(--color-ink); margin-top: 6px; }
  .shift-sub { font-size: 12.5px; color: var(--color-text-secondary); margin-top: 2px; }
  .shift-row {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--color-border);
  }
  .shift-row:last-child { border-bottom: none; }
  .shift-row .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--color-secondary-subtle);
    color: var(--color-secondary);
    font-size: 12px; font-weight: 600;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .shift-row .who { font-size: 13.5px; color: var(--color-text-primary); }
  .shift-row .when { font-family: var(--font-mono); font-size: 11px; color: var(--color-muted); margin-top: 1px; }
  .shift-row .role {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    color: var(--color-muted);
    letter-spacing: 0.05em;
  }

  /* Pattern card ------------------------------------------------------- */
  .pattern {
    background: var(--color-surface-muted);
    border-radius: var(--card-radius);
    padding: 22px 24px;
    border: 1px solid var(--color-border);
  }
  .pattern.editorial {
    background: var(--color-primary-subtle);
  }
  .pattern-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--color-primary-deep);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 10px;
  }
  .pattern-text {
    font-family: var(--font-display);
    font-size: 20px;
    line-height: 1.4;
    color: var(--color-ink);
    margin: 0;
    max-width: 56ch;
    font-weight: 400;
  }
  .pattern-text em { font-style: italic; color: var(--color-primary-deep); font-weight: 300; }
  .pattern-sub { margin-top: 12px; font-size: 13px; color: var(--color-text-secondary); }

  /* Now board ---------------------------------------------------------- */
  .nb-group { margin-bottom: 22px; }
  .nb-group:last-child { margin-bottom: 0; }
  .nb-group-label {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--color-muted);
    font-weight: 500;
    margin-bottom: 10px;
  }
  .nb-event {
    background: white;
    border: 1px solid var(--color-border);
    border-left: 4px solid var(--color-border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
  }
  .nb-event.good { border-left-color: var(--color-mood-good); }
  .nb-event.okay { border-left-color: var(--color-mood-okay); }
  .nb-event.difficult { border-left-color: var(--color-mood-difficult); }
  .nb-event.crisis { border-left-color: var(--color-mood-crisis); }
  .nb-event-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .nb-type {
    font-family: var(--font-mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--color-muted);
    font-weight: 500;
  }
  .nb-time { font-family: var(--font-mono); font-size: 11px; color: var(--color-muted); }
  .nb-text { font-size: 13.5px; color: var(--color-ink); margin-top: 4px; line-height: 1.5; }
  .nb-marker {
    display: flex; align-items: center; gap: 8px;
    margin: 16px 0;
  }
  .nb-marker .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-primary); animation: pulse 2s infinite; }
  .nb-marker-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--color-primary-deep);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }
  .nb-marker .rule { flex: 1; height: 1px; background: var(--color-primary); opacity: 0.4; }

  /* Recipient chips ---------------------------------------------------- */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--color-border);
    background: white;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    color: var(--color-text-primary);
  }
  .chip:hover { border-color: var(--color-primary); }
  .chip.active { background: var(--color-primary-subtle); border-color: var(--color-primary); color: var(--color-primary-deep); }
  .chip .ini {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--color-secondary-subtle);
    color: var(--color-secondary);
    font-size: 10px; font-weight: 600;
    display: grid; place-items: center;
  }

  /* Magazine layout cards --------------------------------------------- */
  .mag-card { padding: 22px; }
  .mag-stat { font-family: var(--font-display); font-size: 36px; line-height: 1; color: var(--color-ink); font-weight: 400; letter-spacing: -0.02em; }
  .mag-stat em { font-style: italic; color: var(--color-primary-deep); font-weight: 300; }
  .mag-label { font-family: var(--font-mono); font-size: 11px; color: var(--color-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 6px; }
  .mag-note { font-size: 13px; color: var(--color-text-secondary); margin-top: 12px; line-height: 1.5; }

  /* Surface tints ------------------------------------------------------ */
  body.surface-paper { background: #F8F3EA; }
  body.surface-morning { background: #FDF8F0; }
  body.surface-dusk { background: #F0E8DD; }

  /* Dense + Cozy ------------------------------------------------------ */
  body.density-cozy { --row-gap: 22px; --card-pad: 24px; --header-pad-y: 16px; --hero-pad: 40px; }
  body.density-comfortable { --row-gap: 16px; --card-pad: 20px; --header-pad-y: 12px; --hero-pad: 32px; }
  body.density-compact { --row-gap: 10px; --card-pad: 14px; --header-pad-y: 9px; --hero-pad: 20px; }

  /* Focus styles ------------------------------------------------------- */
  a:focus-visible, button:focus-visible {
    outline: 2px solid var(--color-primary);
    outline-offset: 2px;
  }

  /* Scrollbar tweak */
  .shell::-webkit-scrollbar { width: 6px; }
  .shell::-webkit-scrollbar-thumb { background: rgba(250,239,224,0.1); border-radius: 4px; }

  /* Print-y bit just to be safe */
  @media (max-width: 720px) {
    .app { grid-template-columns: 1fr; }
    .shell { display: none; }
    .page { padding: 16px; }
  }
</style>
</head>
