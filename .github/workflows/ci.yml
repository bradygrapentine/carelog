name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # GitHub merge queue fires checks against a synthetic merge_group SHA
  # (the queued PR rebased onto main + sibling queued PRs). Required-check
  # gating only works if the same workflows fire on this event.
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# dorny/paths-filter needs read access to the PR's file list.
permissions:
  contents: read
  pull-requests: read

jobs:
  # ─── Path detection — TD-35 fix ─────────────────────────────────────────────
  # WHY dorny/paths-filter instead of inline contains(toJSON(...))?
  #
  # TD-30 (PR #164) used:
  #   contains(toJSON(github.event.pull_request.changed_files), 'apps/web')
  #
  # This is broken in two ways:
  #   1. `github.event.pull_request.changed_files` is an INTEGER (the count of
  #      changed files), not a list of paths. toJSON of an integer is "42", not
  #      a JSON array of filenames — contains() always returns false.
  #   2. `github.event.commits[0].modified` only exists on push events, not on
  #      pull_request events. On PRs it resolves to null/missing.
  #
  # Result: every path-gated job silently SKIPPED on every PR. CI Summary
  # treats SKIPPED as pass, so deps bumps merged without running test suites.
  # TD-29 (#165) surfaced this: pnpm-lock.yaml was changed but Web/Mobile/
  # RLS/E2E all skipped. Fix: use dorny/paths-filter@v3 which calls the
  # GitHub Files API to get actual changed-file paths. (TD-35)

  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      supabase: ${{ steps.filter.outputs.supabase }}
      deps: ${{ steps.filter.outputs.deps }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
            mobile:
              - 'apps/mobile/**'
            supabase:
              - 'supabase/**'
            deps:
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'apps/*/package.json'
              - 'apps/mobile/package-lock.json'
              - '.github/workflows/**'
            e2e:
              - 'e2e/**'

  # ─── Fast checks — run in parallel ──────────────────────────────────────────

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  # ─── Unit tests ──────────────────────────────────────────────────────────────

  web-tests:
    name: Web — unit tests
    needs: changes
    runs-on: ubuntu-latest
    # Always run in merge queue; on PRs/push run when web/package/lockfile changes
    if: |
      github.event_name == 'merge_group' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.deps == 'true'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Chromium for browser tests
        run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Run web unit tests
        run: npx vitest run
        working-directory: apps/web

  mobile-tests:
    name: Mobile — unit tests
    needs: changes
    runs-on: ubuntu-latest
    # Always run in merge queue; on PRs/push run when mobile/lockfile changes
    if: |
      github.event_name == 'merge_group' ||
      needs.changes.outputs.mobile == 'true' ||
      needs.changes.outputs.deps == 'true'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run Jest tests
        run: npx jest --no-coverage --ci
        working-directory: apps/mobile

  mobile-android-build:
    name: Mobile — Android debug build
    needs: changes
    runs-on: ubuntu-latest
    # Only run on PRs that touch mobile code (android/ is committed, so this validates it builds)
    if: |
      github.event_name == 'pull_request' && (
        needs.changes.outputs.mobile == 'true' ||
        needs.changes.outputs.deps == 'true'
      )
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Make gradlew executable
        run: chmod +x apps/mobile/android/gradlew
      - name: Build Android Debug APK
        # continue-on-error: CI may lack full Android SDK tooling; build warnings are acceptable
        # Remove continue-on-error once Android SDK is confirmed stable in CI
        continue-on-error: true
        run: cd apps/mobile/android && ./gradlew assembleDebug --no-daemon
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: android-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ─── RLS + database tests ────────────────────────────────────────────────────

  rls-tests:
    name: RLS pgTAP tests
    needs: changes
    runs-on: ubuntu-latest
    # Always run in merge queue; on PRs/push run when supabase changes
    if: |
      github.event_name == 'merge_group' ||
      needs.changes.outputs.supabase == 'true'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start Supabase
        run: supabase start
      - name: Run pgTAP tests
        run: supabase test db

  # ─── E2E — runs on PR + push to main (slow, needs full stack) ───────────────

  e2e:
    name: E2E (Playwright)
    needs: changes
    runs-on: ubuntu-latest
    # Run on push to main OR PRs/merge_queue that touch web/e2e/lockfile
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request' && (
        needs.changes.outputs.web == 'true' ||
        needs.changes.outputs.e2e == 'true' ||
        needs.changes.outputs.deps == 'true'
      ))
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Start Supabase (includes Inbucket mail on :54324)
        run: |
          supabase start
          supabase status -o env >> $GITHUB_ENV
      - name: Build web app
        run: |
          NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321 \
          NEXT_PUBLIC_SUPABASE_ANON_KEY="$ANON_KEY" \
          NEXT_PUBLIC_APP_URL=http://localhost:3000 \
          pnpm --filter web build
      - name: Start web app
        run: |
          NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321 \
          NEXT_PUBLIC_SUPABASE_ANON_KEY="$ANON_KEY" \
          SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY" \
          NEXT_PUBLIC_APP_URL=http://localhost:3000 \
          pnpm --filter web start &
          npx wait-on http://localhost:3000 --timeout 60000
      - name: Run Playwright tests
        run: pnpm test:e2e
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        # (TD-47) upload on cancelled too, so we can yank an in-progress
        # debug run for its partial trace without losing the artifact.
        if: failure() || cancelled()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Upload Playwright test-results (traces, error contexts)
        uses: actions/upload-artifact@v4
        if: failure() || cancelled()
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7

  # ─── Meta-job: single required check for branch protection ──────────────────
  # Replace all 12 individual required checks with just "CI Summary".
  # Upstream jobs that are skipped (path not touched) count as pass.
  # Only fails if an upstream job actually FAILED (not skipped).

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - typecheck
      - lint
      - web-tests
      - mobile-tests
      - mobile-android-build
      - rls-tests
      - e2e
    steps:
      - name: Check all required jobs passed or were skipped
        run: |
          results='${{ toJSON(needs) }}'
          echo "Job results: $results"

          failed=0
          for job in typecheck lint web-tests mobile-tests mobile-android-build rls-tests e2e; do
            result=$(echo "$results" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          job = '$job'
          if job in data:
              print(data[job]['result'])
          else:
              print('skipped')
          ")
            echo "$job: $result"
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "FAIL: $job returned $result"
              failed=1
            fi
          done

          if [ "$failed" -eq 1 ]; then
            echo "One or more required jobs failed."
            exit 1
          fi

          echo "All required jobs passed or were skipped."
