name: security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Required for GitHub merge queue: workflows producing required checks
  # must fire on the queue's synthetic merge_group SHA, not just on PR head.
  merge_group:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (production, high+)
        run: pnpm audit --prod --audit-level high

  osv-scanner:
    name: OSV Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install OSV Scanner
        run: |
          curl -sSfL https://github.com/google/osv-scanner/releases/download/v1.9.1/osv-scanner_linux_amd64 -o /usr/local/bin/osv-scanner
          echo "c52d68f857d9aa6d6a2e98fcf0fda9e75307d59ee1fe1db26ffc588f1c5fda33  /usr/local/bin/osv-scanner" | sha256sum -c -
          chmod +x /usr/local/bin/osv-scanner

      # TD-29 warn-only: OSV indexes long-tail advisories pnpm.overrides cannot
      # always patch (e.g. unmaintained dev-dep transitives). Failures are
      # surfaced in the run log + Sentry but do not block the merge queue.
      # Hard-blocking advisories should be pinned via pnpm.overrides instead.
      - name: Run OSV Scanner
        continue-on-error: true
        run: osv-scanner --recursive --skip-git ./

  gitleaks:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy:
    name: Vuln scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # TD-29 warn-only: Trivy can lag pnpm overrides (e.g. axios advisory
      # surfaced before posthog-node bumped its pin). Failures are visible
      # in the run log; the authoritative gate is `Dependency audit` which
      # stays hard-blocking and respects pnpm.overrides directly.
      - name: Run Trivy filesystem scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table
