name: Auto-Fix Lint & Type Errors

# Headless Claude Code: when CI fails on a PR, auto-attempt to fix lint/type
# errors and push to the same PR branch. No-op if CLAUDE_CODE_OAUTH_TOKEN is
# unset (e.g. forks, or until the secret is added). Subscription-billed via
# the official anthropic-ai/claude-code-action — no direct ANTHROPIC_API_KEY.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    # Only fire when CI failed on a PR branch (not main, not merge_group)
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_branch != 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Skip if no Claude Code OAuth token
        id: gate
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "CLAUDE_CODE_OAUTH_TOKEN not set — auto-fix disabled."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR branch
        if: steps.gate.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        if: steps.gate.outputs.skip == 'false'
        uses: pnpm/action-setup@v4

      - name: Setup Node
        if: steps.gate.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        if: steps.gate.outputs.skip == 'false'
        run: pnpm install --frozen-lockfile

      - name: Run Claude Code auto-fix
        if: steps.gate.outputs.skip == 'false'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            CI failed on this PR branch. Fix only lint and TypeScript errors.

            Constraints:
            - Run `cd apps/web && npx tsc --noEmit` and `cd apps/web && npx eslint --quiet .` to find errors.
            - Fix only those errors. Do NOT change feature behavior, refactor, or touch unrelated files.
            - Do NOT modify tests, migrations, RLS policies, or `.env*` files.
            - Do NOT use `any`, `@ts-ignore`, or `eslint-disable` to silence errors.
            - PHI rule: never pass email / name / PII to `posthog.identify` or `posthog.capture`.
            - If the failure is a real test failure (not lint/type), STOP and add a PR comment explaining why no auto-fix was attempted.
            - When finished: stage changes, commit with `chore: auto-fix lint/type errors`, and push to the same branch.
          allowed_tools: "Edit,Read,Bash(git:*),Bash(pnpm:*),Bash(npx tsc:*),Bash(npx eslint:*)"
